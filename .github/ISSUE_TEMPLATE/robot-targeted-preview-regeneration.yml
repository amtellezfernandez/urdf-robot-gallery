name: "⚠️ [ISSUE] Regenerate One Robot Preview"
description: Regenerate thumbnails/videos for specific robot files in an existing repo.
title: "robot-targeted-preview-regeneration-request"
labels:
  - robot-regenerate-targeted
body:
  - type: markdown
    attributes:
      value: |
        Use this issue to regenerate previews for specific robot files.
        Paste one or more robot paths below (or gallery copied lines containing path/fileBase/tags).
  - type: input
    id: repo
    attributes:
      label: GitHub repo (URL or owner/repo) (optional)
      description: Optional if robot lines below include full GitHub URLs.
      placeholder: TheRobotStudio/SO-ARM100
  - type: dropdown
    id: update_type
    attributes:
      label: Update type
      options:
        - Regenerate previews/thumbnails
    validations:
      required: true
  - type: textarea
    id: robot_targets
    attributes:
      label: Robot URL(s) / targets to regenerate
      description: >-
        Paste one robot per line. Preferred: full GitHub URL copied from gallery.
        Also supports copied gallery lines with fileBase/tags, or path/file.urdf.
      placeholder: |-
        https://github.com/TheRobotStudio/SO-ARM100/blob/HEAD/robots/so100/so100.urdf
        SO-ARM100 - robots/so100/so100.urdf - fileBase: so100--abc123 - tags: Arm, Gripper
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Notes (optional)
