name: "⚠️ [ISSUE] Regenerate One Robot Preview"
description: Regenerate thumbnails/videos for specific robot files in an existing repo.
title: "robot-targeted-preview-regeneration-request"
labels:
  - robot-regenerate-targeted
body:
  - type: markdown
    attributes:
      value: |
        Use this issue to regenerate previews for specific robot files.
        Paste one or more full GitHub robot file URLs below.
  - type: dropdown
    id: update_type
    attributes:
      label: Update type
      options:
        - Regenerate previews/thumbnails
    validations:
      required: true
  - type: textarea
    id: robot_targets
    attributes:
      label: Robot URL(s) / targets to regenerate
      description: Paste one full GitHub robot file URL per line (copied from gallery).
      placeholder: |-
        https://github.com/TheRobotStudio/SO-ARM100/blob/HEAD/robots/so100/so100.urdf
        https://github.com/bulletphysics/bullet3/blob/HEAD/data/quadruped/minitaur.urdf
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Notes (optional)
