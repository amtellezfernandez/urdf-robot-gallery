name: "⚠️ [ISSUE] Robot Entry Update"
description: Update metadata, mapping, or tags for an existing repo.
title: "robot-update-request"
labels:
  - robot-update
body:
  - type: input
    id: github_repo
    attributes:
      label: GitHub repo (URL or owner/repo)
      description: Existing repo already in gallery.
      placeholder: TheRobotStudio/SO-ARM100
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: Controlled list from docs/tags.json.
      placeholder: Arm, End Effector, Object
  - type: input
    id: structure
    attributes:
      label: Structure
      placeholder: Meshes 2 · Links 2 · Joints 1
  - type: input
    id: morphology
    attributes:
      label: Morphology
      placeholder: Arms 1 · Legs 0 · Wheels 0
  - type: input
    id: robots
    attributes:
      label: Robot mapping
      description: Format "RobotName — path/file.urdf" (or `.xacro`, `.urdf.xacro`).
      placeholder: SO-ARM100 — robots/so100/so100.urdf
    validations:
      required: true
