name: "⚠️ [ISSUE] Robot Entry Update"
description: Update metadata, mapping, or tags for an existing repo.
title: "robot-update-request"
labels:
  - robot-update
body:
  - type: markdown
    attributes:
      value: |
        Keep this short:
        1) Paste the repo.
        2) Choose what to update.
        3) Add tags and/or mapping only if needed.
  - type: input
    id: repo
    attributes:
      label: GitHub repo (URL or owner/repo)
      description: Existing repo already in gallery.
      placeholder: TheRobotStudio/SO-ARM100
    validations:
      required: true
  - type: dropdown
    id: update_type
    attributes:
      label: Update type
      options:
        - Metadata only
        - Mapping change
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: Controlled list from docs/tags.json.
      placeholder: Arm, End Effector, Object
  - type: textarea
    id: robots
    attributes:
      label: Robot mapping (optional)
      description: Needed for "Mapping change". Format "RobotName — path/file.urdf" (or `.xacro`, `.urdf.xacro`).
      placeholder: |-
        SO-ARM100 — robots/so100/so100.urdf
        SO-ARM101 — robots/so101/so101.urdf
  - type: textarea
    id: extra
    attributes:
      label: Notes (optional)
