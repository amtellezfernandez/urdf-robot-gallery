name: "⚠️ [ISSUE] Robot Entry Update"
description: Update metadata, mapping, or tags for an existing repo.
title: "robot-update-request"
labels:
  - robot-update
body:
  - type: input
    id: github_repo
    attributes:
      label: GitHub repo (URL or owner/repo)
      placeholder: TheRobotStudio/SO-ARM100
    validations:
      required: true
  - type: textarea
    id: tags
    attributes:
      label: Macro tags
      description: One line with all macro tags, [x] selected and [] not selected.
      placeholder: Macro tags: Arm [x], Biped [], Dual Arm [], Drone [], End Effector [x], Humanoid [], Mobile Manipulator [], Quadruped [], Wheeled [], Object [], Other []
  - type: input
    id: structure
    attributes:
      label: Structure
      placeholder: Meshes 2 · Links 2 · Joints 1
  - type: input
    id: morphology
    attributes:
      label: Morphology
      placeholder: Arms 1 · Legs 0 · Wheels 0
  - type: input
    id: robots
    attributes:
      label: Robot mapping
      description: Format "RobotName — path/file.urdf" (or `.xacro`, `.urdf.xacro`).
      placeholder: SO-ARM100 — robots/so100/so100.urdf
    validations:
      required: true
