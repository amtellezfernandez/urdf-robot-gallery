name: "01 🆕 [NEW ENTRY] Robot Repo"
description: Submit a new robot repository.
title: "robot-showcase-request"
labels:
  - robot-repo
body:
  - type: markdown
    attributes:
      value: |
        Fast flow:
        1) Submit repo.
        2) Bot ingests and posts detected files + suggested mapping/tags.
        3) (Optional) Edit mapping/tags and save issue to refresh.
        4) Run "Contributor Generate Previews" in your fork with `issue_number`.
        Tags come only from **Tags (optional)**. If empty, no macro tags are applied.
  - type: input
    id: repo
    attributes:
      label: GitHub repo (URL or owner/repo)
      description: Use either full URL or owner/repo (not just the org).
      placeholder: TheRobotStudio/SO-ARM100
    validations:
      required: true
  - type: input
    id: org
    attributes:
      label: Author / Company / Lab (optional)
      placeholder: The Robot Studio
  - type: input
    id: author_site
    attributes:
      label: Author website (optional)
      placeholder: https://www.therobotstudio.com/
  - type: input
    id: author_x
    attributes:
      label: Author X/Twitter (optional)
      placeholder: https://x.com/yourhandle
  - type: input
    id: author_linkedin
    attributes:
      label: Author LinkedIn (optional)
      placeholder: https://www.linkedin.com/company/yourcompany
  - type: input
    id: author_github
    attributes:
      label: Author GitHub (optional)
      placeholder: https://github.com/yourorg
  - type: textarea
    id: summary
    attributes:
      label: Short summary
      placeholder: LeRobot-compatible SO-ARM100 with gripper.
  - type: input
    id: demo
    attributes:
      label: Demo URL (optional)
      placeholder: https://huggingface.co/spaces/your-demo
  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: >-
        Optional correction. If empty, no macro tags are applied.
        Common macro tags: Arm, Gripper, Hand, Humanoid, Quadruped, Biped, Wheeled, Tracked, Mobile, Aerial, Underwater.
      placeholder: Arm, Gripper, Humanoid
  - type: textarea
    id: hf_datasets
    attributes:
      label: Hugging Face datasets (one per line, optional)
      description: Paste one link per line.
      placeholder: |-
        https://huggingface.co/datasets/your-dataset
        https://huggingface.co/datasets/your-other-dataset
  - type: textarea
    id: robots
    attributes:
      label: Robot mapping (optional)
      description: Use "RobotName — file.urdf" or "RobotName — subdir/file.urdf". If filename is ambiguous, use path form.
      placeholder: |-
        SO-ARM100 — so100.urdf
        SO-ARM101 — robots/so101/so101_new_calib.urdf
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
  - type: textarea
    id: extra
    attributes:
      label: Extra links or notes (optional)
