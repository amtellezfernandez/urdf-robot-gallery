name: "13 [ISSUE] Regenerate Missing Repo Previews"
description: Regenerate missing thumbnails/videos for an existing repo.
title: "robot-repo-preview-regeneration-request"
labels:
  - robot-regenerate-repo
body:
  - type: markdown
    attributes:
      value: |
        Use this issue to regenerate missing previews for a full repository.
        Do not add robot targets; this runs repo-wide missing media generation.
  - type: input
    id: repo
    attributes:
      label: GitHub repo (URL or owner/repo)
      description: Existing repo already in gallery.
      placeholder: TheRobotStudio/SO-ARM100
    validations:
      required: true
  - type: dropdown
    id: update_type
    attributes:
      label: Update type
      options:
        - Regenerate previews/thumbnails
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Notes (optional)
