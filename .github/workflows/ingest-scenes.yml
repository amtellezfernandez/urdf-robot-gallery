name: Ingest scene submissions

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to ingest
        required: true

concurrency:
  group: ingest-scenes
  cancel-in-progress: false

jobs:
  ingest:
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.issue.labels.*.name, ','), 'scene-submission') || startsWith(github.event.issue.title || '', 'scene-submission-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Update scenes index from issue
        uses: actions/github-script@v7
        with:
          script: |
            const inputIssueNumber = context.payload.inputs?.issue_number;
            const issueNumber = context.payload.issue?.number || (inputIssueNumber ? Number(inputIssueNumber) : null);
            if (!issueNumber) {
              core.setFailed("Missing issue number.");
              return;
            }

            const issue =
              context.payload.issue ||
              (
                await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                })
              ).data;

            const issueOwner = context.repo.owner;
            const issueRepo = context.repo.repo;
            const body = issue.body || "";
            const issueAuthor = (issue.user?.login || "").toLowerCase();
            const MAINTAINERS = new Set(["amtellezfernandez", "urdf-studio"]);

            const ensureComment = async (prefix, text) => {
              const comments = await github.rest.issues.listComments({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                per_page: 100,
              });
              const existing = comments.data.find(
                (comment) =>
                  comment.user &&
                  comment.user.type === "Bot" &&
                  typeof comment.body === "string" &&
                  comment.body.startsWith(prefix)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: issueOwner,
                  repo: issueRepo,
                  comment_id: existing.id,
                  body: text,
                });
                return;
              }
              await github.rest.issues.createComment({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                body: text,
              });
            };

            const clean = (value) => {
              if (!value) return "";
              const trimmed = value.trim();
              if (!trimmed || trimmed.toLowerCase() === "no response" || trimmed === "_No response_") {
                return "";
              }
              return trimmed;
            };

            const parseIssueFields = (text) => {
              const fields = {};
              const regex = /^###\s+(.+)\n+([\s\S]*?)(?=^###\s+|\Z)/gm;
              let match;
              while ((match = regex.exec(text)) !== null) {
                fields[match[1].trim()] = clean(match[2]);
              }
              return fields;
            };

            const parseList = (value) =>
              value
                .split(/[,\n]/)
                .map((item) => item.trim())
                .filter(Boolean);

            const normalizeUrl = (value) => {
              const trimmed = clean(value);
              if (!trimmed) return "";
              let parsed;
              try {
                parsed = new URL(trimmed);
              } catch {
                return "";
              }
              if (!/^https?:$/i.test(parsed.protocol)) return "";
              const host = parsed.hostname.toLowerCase();
              if (host === "github.com" || host === "www.github.com") {
                const match = parsed.pathname.match(/^\/([^/]+)\/([^/]+)\/blob\/(.+)$/);
                if (match) {
                  return `https://raw.githubusercontent.com/${match[1]}/${match[2]}/${match[3]}`;
                }
              }
              return parsed.toString();
            };

            const slugify = (value) =>
              value
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9._-]+/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");

            const hashString = (value) => {
              let hash = 2166136261;
              for (let i = 0; i < value.length; i += 1) {
                hash ^= value.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
              }
              return (hash >>> 0).toString(36);
            };

            const fields = parseIssueFields(body);
            const sceneUrl =
              normalizeUrl(fields["Scene JSON URL"]) ||
              normalizeUrl((body.match(/https?:\/\/[^\s)]+/i) || [])[0] || "");
            const title = clean(fields["Scene title"]);
            const requestedId = clean(fields["Scene ID (optional)"]);
            const description = clean(fields["Description (optional)"]);
            const owner = clean(fields["Owner (optional)"]);
            const tags = Array.from(new Set(parseList(clean(fields["Tags (optional)"]))));
            const runtimeTargets = Array.from(
              new Set(parseList(clean(fields["Runtime targets (optional)"])))
            );

            if (!sceneUrl) {
              await ensureComment(
                "Auto-ingest: missing scene URL.",
                "Auto-ingest: missing or invalid Scene JSON URL. Please provide a public http(s) link."
              );
              return;
            }
            if (!title) {
              await ensureComment(
                "Auto-ingest: missing scene title.",
                "Auto-ingest: missing Scene title. Please provide a title and edit this issue."
              );
              return;
            }

            let canAutoIngest = MAINTAINERS.has(issueAuthor);
            if (!canAutoIngest && issue.user?.login) {
              try {
                const permission = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: issueOwner,
                  repo: issueRepo,
                  username: issue.user.login,
                });
                const level = (permission.data.permission || "").toLowerCase();
                canAutoIngest = ["admin", "maintain", "write"].includes(level);
              } catch {
                canAutoIngest = false;
              }
            }

            if (!canAutoIngest) {
              await ensureComment(
                "Auto-ingest: manual review required.",
                `Auto-ingest: manual review required for @${issue.user?.login || "unknown"}. ` +
                  "A maintainer can run this workflow manually if approved."
              );
              return;
            }

            const filePath = "docs/scenes/index.json";
            const scenesFile = await github.rest.repos.getContent({
              owner: issueOwner,
              repo: issueRepo,
              path: filePath,
              ref: "main",
            });

            if (!("content" in scenesFile.data)) {
              core.setFailed("docs/scenes/index.json is not a file.");
              return;
            }

            const existingContent = Buffer.from(scenesFile.data.content, "base64").toString("utf8");
            const existing = JSON.parse(existingContent);
            if (!Array.isArray(existing)) {
              core.setFailed("docs/scenes/index.json must be an array.");
              return;
            }

            const generatedId = requestedId
              ? slugify(requestedId)
              : slugify(title) || `scene-${hashString(sceneUrl).slice(0, 8)}`;
            const nowIso = new Date().toISOString();
            const normalizedTargets = runtimeTargets.length ? runtimeTargets : ["link"];

            const nextEntry = {
              id: generatedId,
              title,
              importUrl: sceneUrl,
              ...(description ? { description } : {}),
              ...(owner ? { owner } : {}),
              ...(tags.length ? { tags } : {}),
              ...(normalizedTargets.length ? { runtimeTargets: normalizedTargets } : {}),
              updatedAt: nowIso,
            };

            const upserted = [];
            let replaced = false;
            for (const item of existing) {
              if (!item || typeof item !== "object") continue;
              const sameId = typeof item.id === "string" && item.id === generatedId;
              const sameUrl = typeof item.importUrl === "string" && normalizeUrl(item.importUrl) === sceneUrl;
              if (sameId || sameUrl) {
                if (!replaced) {
                  upserted.push(nextEntry);
                  replaced = true;
                }
                continue;
              }
              upserted.push(item);
            }
            if (!replaced) upserted.push(nextEntry);

            const deduped = [];
            const seenIds = new Set();
            const seenUrls = new Set();
            for (const item of upserted) {
              const id = typeof item.id === "string" ? item.id : "";
              const url = typeof item.importUrl === "string" ? normalizeUrl(item.importUrl) : "";
              if (!id || !url) continue;
              if (seenIds.has(id) || seenUrls.has(url)) continue;
              seenIds.add(id);
              seenUrls.add(url);
              deduped.push(item);
            }
            deduped.sort((a, b) => String(a.title || "").localeCompare(String(b.title || "")));

            const nextContent = `${JSON.stringify(deduped, null, 2)}\n`;
            if (nextContent === existingContent) {
              await ensureComment(
                "Auto-ingest: no changes.",
                `Auto-ingest: no changes required for scene \`${generatedId}\`.`
              );
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: issueOwner,
              repo: issueRepo,
              path: filePath,
              message: `chore(scenes): ingest submission #${issue.number}`,
              content: Buffer.from(nextContent, "utf8").toString("base64"),
              sha: scenesFile.data.sha,
              branch: "main",
              committer: {
                name: "github-actions[bot]",
                email: "41898282+github-actions[bot]@users.noreply.github.com",
              },
              author: {
                name: "github-actions[bot]",
                email: "41898282+github-actions[bot]@users.noreply.github.com",
              },
            });

            if (issue.title.startsWith("scene-submission-request")) {
              await github.rest.issues.update({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                title: `scene-submission: ${title}`,
              });
            }

            await ensureComment(
              "Auto-ingest: updated scenes index.",
              `Auto-ingest: updated \`${filePath}\` on \`main\` for scene \`${generatedId}\`.`
            );
