name: Contributor Generate Previews

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo URL or owner/repo"
        required: true
      robot_targets:
        description: "Targets (optional)"
        required: false

env:
  UPSTREAM_REPO: urdf-studio/urdf-robot-gallery
  PREVIEW_BATCH_SIZE: "5"
  MAX_BATCH_COMMITS: "200"
  DEFAULT_FORMATS: "webp"
  PREVIEW_RENDER_SIZE: "800"
  PREVIEW_FRAMING_TARGET_NDC: "0.88"
  PREVIEW_FRAMING_DISTANCE_SAFETY: "1.01"
  PREVIEW_WARN_MIN_FILL: "0.35"
  PREVIEW_ENFORCE_MIN_FILL: "0.01"
  PREVIEW_WARN_MIN_EDGE_MARGIN: "10"
  PREVIEW_ENFORCE_MIN_EDGE_MARGIN: "1"

permissions:
  contents: write
  pull-requests: read

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: contributor-previews-${{ inputs.repo }}
      cancel-in-progress: false
    steps:
      - name: Prevent upstream run
        run: |
          if [ "${GITHUB_REPOSITORY}" = "${UPSTREAM_REPO}" ]; then
            echo "::error::Run this workflow in your fork so it uses your own GitHub quota."
            exit 1
          fi

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve run branch
        id: branch
        env:
          REPO_INPUT: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          repo_input="$(printf '%s' "${REPO_INPUT:-}" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [ -z "$repo_input" ]; then
            echo "::error::Provide repo."
            exit 1
          fi

          repo_ref="$(printf '%s' "$repo_input" | sed -E 's#^https?://github.com/##I; s#\.git$##I; s#/+$##')"
          if ! printf '%s' "$repo_ref" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "::error::Invalid repo input. Use owner/repo or full GitHub URL."
            exit 1
          fi
          safe_repo="$(printf '%s' "$repo_ref" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9]+#-#g; s#^-+|-+$##g')"
          branch="contrib/previews-repo-${safe_repo}"
          run_label="repo ${repo_ref}"

          echo "repo_ref=$repo_ref" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "run_label=$run_label" >> "$GITHUB_OUTPUT"

      - name: Prepare run branch
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          branch="${{ steps.branch.outputs.branch }}"
          git fetch upstream main
          git checkout -B "$branch" upstream/main

          # Keep contributor branch reproducible; no manual branch delete needed.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git push --force-with-lease origin "$branch"
          fi

      - name: Resolve repoKey and run context
        id: issue
        uses: actions/github-script@v7
        env:
          REPO_INPUT: ${{ inputs.repo }}
          ROBOT_TARGETS_INPUT: ${{ inputs.robot_targets }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        with:
          github-token: ${{ github.token }}
          script: |
            const repoInputRaw = String(process.env.REPO_INPUT || "").trim();
            const robotTargetsInputRaw = String(process.env.ROBOT_TARGETS_INPUT || "").trim();
            const [owner, repo] = String(process.env.UPSTREAM_REPO || "").split("/");
            if (!owner || !repo) {
              core.setFailed("Invalid UPSTREAM_REPO.");
              return;
            }
            if (!repoInputRaw) {
              core.setFailed("Provide repo.");
              return;
            }

            const issueUrl = `https://github.com/${owner}/${repo}/blob/main/docs/preview-regeneration.md`;
            let repoKey = "";

            const normalizeFieldValue = (value) => {
              const normalized = String(value || "").trim();
              if (!normalized || normalized.toLowerCase() === "no response" || normalized === "_No response_") {
                return "";
              }
              return normalized;
            };
            const parseRepoKeyValue = (value) => {
              let normalized = normalizeFieldValue(value);
              if (!normalized) return "";

              const markdownUrl = normalized.match(/\((https?:\/\/github\.com\/[^)]+)\)/i);
              if (markdownUrl) normalized = markdownUrl[1];

              normalized = normalized.replace(/\.git$/i, "").replace(/\/+$/, "");

              const ownerRepo = normalized.match(/^([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)$/);
              if (ownerRepo) {
                return `${ownerRepo[1]}/${ownerRepo[2]}`.toLowerCase();
              }

              const urlMatch = normalized.match(/github\.com\/([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)/i);
              if (urlMatch) {
                return `${urlMatch[1]}/${urlMatch[2]}`.toLowerCase();
              }

              return "";
            };
            const mappingLines = [];
            const robotTargetsText = normalizeFieldValue(robotTargetsInputRaw);
            const robotTargetLines = robotTargetsText
              ? robotTargetsText
                  .split(/\r?\n/)
                  .map((line) => line.trim())
                  .filter(Boolean)
              : [];
            const issueTags = "";
            const repoFieldValue = normalizeFieldValue(repoInputRaw);

            repoKey = parseRepoKeyValue(repoFieldValue);

            if (!repoKey) {
              core.setFailed("Could not parse repoKey. Use owner/repo or full GitHub URL.");
              return;
            }

            core.info(`Resolved repoKey: ${repoKey}`);
            core.setOutput("repo_key", repoKey);
            core.setOutput("mode", "repo");
            core.setOutput("run_label", `repo ${repoKey}`);
            core.setOutput("issue_url", issueUrl);
            core.setOutput("mapping_present", mappingLines.length > 0 ? "true" : "false");
            core.setOutput("mapping_count", String(mappingLines.length));
            core.setOutput("robot_targets_present", robotTargetLines.length > 0 ? "true" : "false");
            core.setOutput("robot_targets_count", String(robotTargetLines.length));
            core.setOutput("robot_targets_b64", Buffer.from(robotTargetsText, "utf8").toString("base64"));
            core.setOutput("issue_tags", issueTags ? issueTags.replace(/\r?\n/g, ", ") : "");

      - name: Check branch lock (no competing open PR)
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          CURRENT_FORK: ${{ github.repository }}
        with:
          github-token: ${{ github.token }}
          script: |
            const branch = String(process.env.BRANCH_NAME || "").trim();
            const currentFork = String(process.env.CURRENT_FORK || "").toLowerCase();
            const [owner, repo] = String(process.env.UPSTREAM_REPO || "").split("/");

            if (!owner || !repo || !branch) {
              core.setFailed("Invalid branch or upstream repo.");
              return;
            }

            let pulls = [];
            try {
              pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                base: "main",
                per_page: 100,
              });
            } catch (error) {
              core.warning(
                `Octokit pull list failed (${error.status || "unknown"} ${error.message || error}). Falling back to public API.`
              );
              const fallback = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/pulls?state=open&base=main&per_page=100`,
                {
                  headers: {
                    "User-Agent": "contributor-preview-workflow",
                    "Accept": "application/vnd.github+json",
                  },
                }
              );
              if (!fallback.ok) {
                core.setFailed(`Failed to list open PRs via public API (HTTP ${fallback.status}).`);
                return;
              }
              pulls = await fallback.json();
            }

            const conflict = pulls.find((pr) => {
              const headRef = pr?.head?.ref || "";
              if (headRef !== branch) return false;
              const source = `${pr?.head?.repo?.owner?.login || ""}/${pr?.head?.repo?.name || ""}`.toLowerCase();
              return source && source !== currentFork;
            });

            if (conflict) {
              core.setFailed(
                `Branch ${branch} is already being handled in ${conflict.html_url}. ` +
                  "Please wait for that PR to close or use a different repo."
              );
              return;
            }

            const own = pulls.find((pr) => {
              const headRef = pr?.head?.ref || "";
              if (headRef !== branch) return false;
              const source = `${pr?.head?.repo?.owner?.login || ""}/${pr?.head?.repo?.name || ""}`.toLowerCase();
              return source === currentFork;
            });
            if (own) {
              core.notice(`Found your existing open PR for this branch: ${own.html_url}`);
            } else {
              core.notice(`No competing open PR found for branch ${branch}.`);
            }

      - name: Verify repo exists in docs/robots.json
        env:
          REPO_KEY: ${{ steps.issue.outputs.repo_key }}
        run: |
          node -e '
          const fs = require("fs");
          const key = String(process.env.REPO_KEY || "").toLowerCase();
          const data = JSON.parse(fs.readFileSync("docs/robots.json", "utf8"));
          if (!Array.isArray(data)) {
            console.error("docs/robots.json is not an array");
            process.exit(1);
          }
          const found = data.some((entry) => String(entry.repoKey || "").toLowerCase() === key);
          if (!found) {
            console.error(`repoKey ${key} not found in docs/robots.json. Ask a maintainer to ingest the issue first.`);
            process.exit(1);
          }
          console.log(`repoKey ${key} found in docs/robots.json`);
          '

      - name: Resolve targeted robot keys from issue
        id: target
        env:
          REPO_KEY: ${{ steps.issue.outputs.repo_key }}
          ROBOT_TARGETS_B64: ${{ steps.issue.outputs.robot_targets_b64 }}
        run: |
          node -e '
          const fs = require("fs");
          const repoKey = String(process.env.REPO_KEY || "").trim().toLowerCase();
          const rawTargets = Buffer.from(String(process.env.ROBOT_TARGETS_B64 || ""), "base64")
            .toString("utf8")
            .trim();
          const out = process.env.GITHUB_OUTPUT;
          if (!rawTargets) {
            fs.appendFileSync(out, "resolved_keys=\n");
            fs.appendFileSync(out, "resolved_count=0\n");
            fs.appendFileSync(out, "unresolved_count=0\n");
            fs.appendFileSync(out, "selection_mode=repo\n");
            process.exit(0);
          }

          const normalizePath = (value) =>
            String(value || "")
              .trim()
              .replace(/\\/g, "/")
              .replace(/^\.\//, "")
              .replace(/^\/+/, "")
              .replace(/\/+/g, "/");
          const stripExt = (value) =>
            String(value || "")
              .replace(/\.urdf\.xacro$/i, "")
              .replace(/\.xacro$/i, "")
              .replace(/\.urdf$/i, "");

          const docs = JSON.parse(fs.readFileSync("docs/robots.json", "utf8"));
          const repoEntry = docs.find((entry) => String(entry?.repoKey || "").toLowerCase() === repoKey);
          if (!repoEntry) {
            fs.appendFileSync(out, "resolved_keys=\n");
            fs.appendFileSync(out, "resolved_count=0\n");
            fs.appendFileSync(out, "unresolved_count=0\n");
            fs.appendFileSync(out, "selection_mode=repo\n");
            process.exit(0);
          }

          const robots = Array.isArray(repoEntry.robots) ? repoEntry.robots : [];
          const byFileBase = new Map();
          const byFilePath = new Map();
          const byStem = new Map();
          const byName = new Map();
          const remember = (map, key, fileBase) => {
            if (!key || !fileBase) return;
            if (!map.has(key)) map.set(key, new Set());
            map.get(key).add(fileBase);
          };

          for (const robot of robots) {
            const file = normalizePath(typeof robot === "string" ? robot : robot?.file || "");
            const fileBase = String(typeof robot === "string" ? "" : robot?.fileBase || "").trim();
            const name = String(typeof robot === "string" ? stripExt(file) : robot?.name || "").trim().toLowerCase();
            if (!fileBase) continue;
            remember(byFileBase, fileBase.toLowerCase(), fileBase);
            remember(byFilePath, file.toLowerCase(), fileBase);
            const stem = stripExt(file).split("/").pop()?.toLowerCase() || "";
            remember(byStem, stem, fileBase);
            remember(byName, name, fileBase);
          }

          const lines = rawTargets
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);
          const resolved = new Set();
          let unresolvedCount = 0;

          const pickUnique = (set) => {
            if (!set || set.size !== 1) return "";
            return Array.from(set)[0] || "";
          };

          const extractRobotPath = (line) => {
            const text = String(line || "").trim();
            if (!text) return "";

            const githubBlobMatch = text.match(
              /https?:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/blob\/[^\/]+\/([^?#\s]+)/i
            );
            if (githubBlobMatch?.[1]) {
              try {
                return decodeURIComponent(githubBlobMatch[1]);
              } catch {
                return githubBlobMatch[1];
              }
            }

            const rawContentMatch = text.match(
              /https?:\/\/raw\.githubusercontent\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/[^\/]+\/([^?#\s]+)/i
            );
            if (rawContentMatch?.[1]) {
              try {
                return decodeURIComponent(rawContentMatch[1]);
              } catch {
                return rawContentMatch[1];
              }
            }

            const pathMatch = text.match(/([a-zA-Z0-9_./\\-]+\.(?:urdf(?:\.xacro)?|xacro))/i);
            return pathMatch?.[1] || "";
          };

          for (const line of lines) {
            let fileBase = "";
            const fbMatch = line.match(/filebase\s*[:=]\s*([a-z0-9._-]+--[a-z0-9]+)/i);
            if (fbMatch?.[1]) {
              fileBase = fbMatch[1];
            }
            if (!fileBase) {
              const keyMatch = line.match(/([a-z0-9_.-]+\/[a-z0-9_.-]+)::([a-z0-9._-]+--[a-z0-9]+)/i);
              if (keyMatch?.[2]) {
                fileBase = keyMatch[2];
              }
            }
            if (!fileBase) {
              const directMatch = line.match(/\b([a-z0-9._-]+--[a-z0-9]+)\b/i);
              if (directMatch?.[1]) {
                fileBase = directMatch[1];
              }
            }

            let resolvedBase = "";
            if (fileBase) {
              resolvedBase = pickUnique(byFileBase.get(fileBase.toLowerCase()));
            }

            if (!resolvedBase) {
              const extractedPath = extractRobotPath(line);
              if (extractedPath) {
                const normalizedPath = normalizePath(extractedPath).toLowerCase();
                resolvedBase = pickUnique(byFilePath.get(normalizedPath));
                if (!resolvedBase) {
                  const stem = stripExt(normalizedPath).split("/").pop()?.toLowerCase() || "";
                  resolvedBase = pickUnique(byStem.get(stem));
                }
              }
            }

            if (!resolvedBase) {
              const namePart = line.split(/\s[-:]\s/)[0].trim().toLowerCase();
              if (namePart && namePart !== line.toLowerCase()) {
                resolvedBase = pickUnique(byName.get(namePart));
              }
            }

            if (resolvedBase) {
              resolved.add(`${repoKey}::${resolvedBase}`);
            } else {
              unresolvedCount += 1;
            }
          }

          const resolvedKeys = Array.from(resolved).sort();
          fs.appendFileSync(out, `resolved_keys=${resolvedKeys.join(",")}\n`);
          fs.appendFileSync(out, `resolved_count=${resolvedKeys.length}\n`);
          fs.appendFileSync(out, `unresolved_count=${unresolvedCount}\n`);
          fs.appendFileSync(out, `selection_mode=${resolvedKeys.length > 0 ? "targeted" : "repo"}\n`);
          '

      - name: Verify bundled preview generator
        run: |
          set -euo pipefail
          test -f tools/contributor-preview/scripts/generate-missing-previews.mjs
          test -f tools/contributor-preview/scripts/generate-robot-previews.mjs
          test -f tools/contributor-preview/scripts/lib/missing-previews-core.mjs

      - name: Install gallery dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            echo "::warning::No lockfile found in this branch. Falling back to npm install."
            npm install --no-audit --no-fund
          fi

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Install ffmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Tune preview framing defaults
        env:
          FRAMING_TARGET_NDC: ${{ env.PREVIEW_FRAMING_TARGET_NDC }}
          FRAMING_DISTANCE_SAFETY: ${{ env.PREVIEW_FRAMING_DISTANCE_SAFETY }}
        run: |
          node -e '
          const fs = require("fs");
          const path = "tools/contributor-preview/scripts/lib/missing-previews-core.mjs";
          let source = fs.readFileSync(path, "utf8");
          const target = Number(process.env.FRAMING_TARGET_NDC || "0");
          const safety = Number(process.env.FRAMING_DISTANCE_SAFETY || "0");
          if (!(target > 0) || !(safety > 0)) {
            throw new Error("Invalid framing values.");
          }
          const targetMatches = (source.match(/framingTargetNdc:\s*[0-9.]+/g) || []).length;
          const safetyMatches = (source.match(/framingDistanceSafety:\s*[0-9.]+/g) || []).length;
          if (!targetMatches || !safetyMatches) {
            throw new Error("Could not locate framing defaults in missing-previews-core.mjs");
          }
          source = source.replaceAll(/framingTargetNdc:\s*[0-9.]+/g, `framingTargetNdc: ${target}`);
          source = source.replaceAll(/framingDistanceSafety:\s*[0-9.]+/g, `framingDistanceSafety: ${safety}`);
          fs.writeFileSync(path, source);
          console.log(`Framing tuned: targetNdc=${target}, distanceSafety=${safety}, replacements=${targetMatches + safetyMatches}`);
          '

      - name: Install xacro API runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi uvicorn xacro

      - name: Start local xacro API
        run: |
          set -euo pipefail
          cat > /tmp/xacro-api.py <<'PY'
          import base64
          import io
          import os
          import re
          import tempfile
          from contextlib import redirect_stderr
          from pathlib import Path
          from typing import Dict, List, Optional

          import uvicorn
          from fastapi import FastAPI, HTTPException
          from pydantic import BaseModel, Field
          import xacro
          import xacro.substitution_args as substitution_args

          PACKAGE_NAME_PATTERN = re.compile(r"<name>\\s*([^<]+)\\s*</name>", re.IGNORECASE)


          class XacroFile(BaseModel):
              path: str
              content_base64: str


          class XacroExpandRequest(BaseModel):
              target_path: str = Field(...)
              files: List[XacroFile] = Field(default_factory=list)
              args: Dict[str, str] = Field(default_factory=dict)
              use_inorder: bool = Field(default=True)


          class XacroExpandResponse(BaseModel):
              urdf: str
              stderr: Optional[str] = None


          def _sanitize_relative_path(path: str) -> Path:
              cleaned = str(path or "").replace("\\\\", "/").lstrip("/")
              if not cleaned:
                  raise HTTPException(status_code=400, detail="Empty file path in xacro payload.")
              rel_path = Path(cleaned)
              if any(part in ("..", "") for part in rel_path.parts):
                  raise HTTPException(status_code=400, detail=f"Invalid file path in xacro payload: {path}")
              return rel_path


          def _extract_package_name(content: bytes, fallback: str) -> str:
              text = content.decode("utf-8", errors="ignore")
              match = PACKAGE_NAME_PATTERN.search(text)
              if not match:
                  return fallback
              name = match.group(1).strip()
              return name or fallback


          def _build_package_map(root: Path, files: List[tuple[Path, bytes]]) -> Dict[str, str]:
              package_map: Dict[str, str] = {}
              for rel_path, content in files:
                  if rel_path.name != "package.xml":
                      continue
                  fallback = rel_path.parent.name
                  package_name = _extract_package_name(content, fallback)
                  if not package_name:
                      continue
                  package_map.setdefault(package_name, str((root / rel_path.parent).resolve()))
              return package_map


          app = FastAPI()


          @app.get("/health")
          def health():
              return {"status": "ok"}


          @app.post("/xacro/expand", response_model=XacroExpandResponse)
          def expand_xacro(payload: XacroExpandRequest) -> XacroExpandResponse:
              target_rel = _sanitize_relative_path(payload.target_path)
              decoded_files: List[tuple[Path, bytes]] = []
              for file in payload.files:
                  rel_path = _sanitize_relative_path(file.path)
                  try:
                      content = base64.b64decode(file.content_base64)
                  except Exception as exc:
                      raise HTTPException(
                          status_code=400,
                          detail=f"Failed to decode xacro file {file.path}: {exc}",
                      ) from exc
                  decoded_files.append((rel_path, content))

              with tempfile.TemporaryDirectory(prefix="urdf-gallery-xacro-") as tmp_dir:
                  root = Path(tmp_dir)
                  for rel_path, content in decoded_files:
                      dest = (root / rel_path).resolve()
                      root_resolved = root.resolve()
                      if not str(dest).startswith(str(root_resolved) + os.sep):
                          raise HTTPException(
                              status_code=400,
                              detail=f"Invalid file path in xacro payload: {rel_path}",
                          )
                      dest.parent.mkdir(parents=True, exist_ok=True)
                      dest.write_bytes(content)

                  target_path = (root / target_rel).resolve()
                  if not target_path.exists():
                      raise HTTPException(
                          status_code=400,
                          detail=f"Target xacro file not found: {payload.target_path}",
                      )

                  package_map = _build_package_map(root, decoded_files)
                  original_eval_find = getattr(substitution_args, "_eval_find", None)

                  def _eval_find(pkg: str) -> str:
                      found = package_map.get(pkg)
                      if found:
                          return found
                      if original_eval_find is not None:
                          return original_eval_find(pkg)
                      raise RuntimeError(f"Package '{pkg}' not found in uploaded files.")

                  stderr_buffer = io.StringIO()
                  try:
                      substitution_args._eval_find = _eval_find
                      process_kwargs = {"mappings": dict(payload.args or {})}
                      if bool(payload.use_inorder):
                          process_kwargs["in_order"] = True
                      with redirect_stderr(stderr_buffer):
                          doc = xacro.process_file(str(target_path), **process_kwargs)
                      urdf = (doc.toxml() or "").strip()
                  except HTTPException:
                      raise
                  except Exception as exc:
                      detail = str(exc).strip() or "xacro failed to expand the file."
                      raise HTTPException(status_code=400, detail=detail) from exc
                  finally:
                      if original_eval_find is not None:
                          substitution_args._eval_find = original_eval_find

                  if not urdf:
                      raise HTTPException(status_code=400, detail="xacro produced empty output.")
                  stderr = stderr_buffer.getvalue().strip()
                  return XacroExpandResponse(urdf=urdf, stderr=stderr or None)


          if __name__ == "__main__":
              uvicorn.run(app, host="127.0.0.1", port=8000, log_level="warning")
          PY
          python /tmp/xacro-api.py > /tmp/xacro-api.log 2>&1 &
          echo $! > /tmp/xacro-api.pid

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8000/health" >/dev/null; then
              echo "XACRO_API_BASE_URL=http://127.0.0.1:8000" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 1
          done

          cat /tmp/xacro-api.log || true
          echo "::error::xacro API failed to start"
          exit 1

      - name: Re-check branch lock before batch processing
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          CURRENT_FORK: ${{ github.repository }}
        with:
          github-token: ${{ github.token }}
          script: |
            const branch = String(process.env.BRANCH_NAME || "").trim();
            const currentFork = String(process.env.CURRENT_FORK || "").toLowerCase();
            const [owner, repo] = String(process.env.UPSTREAM_REPO || "").split("/");

            if (!owner || !repo || !branch) {
              core.setFailed("Invalid branch or upstream repo.");
              return;
            }

            let pulls = [];
            try {
              pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                base: "main",
                per_page: 100,
              });
            } catch (error) {
              core.warning(
                `Octokit pull list failed (${error.status || "unknown"} ${error.message || error}). Falling back to public API.`
              );
              const fallback = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/pulls?state=open&base=main&per_page=100`,
                {
                  headers: {
                    "User-Agent": "contributor-preview-workflow",
                    "Accept": "application/vnd.github+json",
                  },
                }
              );
              if (!fallback.ok) {
                core.setFailed(`Failed to list open PRs via public API (HTTP ${fallback.status}).`);
                return;
              }
              pulls = await fallback.json();
            }

            const conflict = pulls.find((pr) => {
              const headRef = pr?.head?.ref || "";
              if (headRef !== branch) return false;
              const source = `${pr?.head?.repo?.owner?.login || ""}/${pr?.head?.repo?.name || ""}`.toLowerCase();
              return source && source !== currentFork;
            });

            if (conflict) {
              core.setFailed(
                `A competing PR appeared while this run was in progress: ${conflict.html_url}. ` +
                  "Stopping before push to avoid duplicate contributor work."
              );
              return;
            }

            core.notice(`Branch ${branch} is still unlocked for this fork.`);

      - name: Generate, commit, and push preview batches
        id: push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
          RUN_LABEL: ${{ steps.issue.outputs.run_label }}
          REPO_KEY: ${{ steps.issue.outputs.repo_key }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          PREVIEW_BATCH_SIZE: ${{ env.PREVIEW_BATCH_SIZE }}
          MAX_BATCH_COMMITS: ${{ env.MAX_BATCH_COMMITS }}
          DEFAULT_FORMATS: ${{ env.DEFAULT_FORMATS }}
          TARGET_ROBOT_KEYS: ${{ steps.target.outputs.resolved_keys }}
          TARGET_SELECTION_MODE: ${{ steps.target.outputs.selection_mode }}
        run: |
          set -euo pipefail
          branch="${BRANCH_NAME}"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          commits_made=0
          limit_reached=false
          target_keys="${TARGET_ROBOT_KEYS:-}"

          if [ -n "$target_keys" ] && [ "${TARGET_SELECTION_MODE:-}" = "targeted" ]; then
            (
              cd tools/contributor-preview
              node scripts/generate-missing-previews.mjs \
                --gallery "$GITHUB_WORKSPACE" \
                --only "$target_keys" \
                --force \
                --formats "${DEFAULT_FORMATS}" \
                --size "${PREVIEW_RENDER_SIZE}" \
                --xacro-api-base "${XACRO_API_BASE_URL:-http://127.0.0.1:8000}" \
                --no-background \
                --strict-alpha \
                --concurrency 2
            )
            git add docs/previews docs/thumbnails docs/previews.json
            if ! git diff --cached --quiet; then
              commits_made=1
              git commit -m "Add preview assets for ${RUN_LABEL} (${REPO_KEY}) [targeted]"
              git push origin "HEAD:$branch"
            fi
          else
            while true; do
              (
                cd tools/contributor-preview
                node scripts/generate-missing-previews.mjs \
                  --gallery "$GITHUB_WORKSPACE" \
                  --only-repos "$REPO_KEY" \
                  --max-per-repo "${PREVIEW_BATCH_SIZE}" \
                  --formats "${DEFAULT_FORMATS}" \
                  --size "${PREVIEW_RENDER_SIZE}" \
                  --xacro-api-base "${XACRO_API_BASE_URL:-http://127.0.0.1:8000}" \
                  --no-background \
                  --strict-alpha \
                  --concurrency 2
              )

              git add docs/previews docs/thumbnails docs/previews.json
              if git diff --cached --quiet; then
                break
              fi

              commits_made=$((commits_made + 1))
              git commit -m "Add preview assets for ${RUN_LABEL} (${REPO_KEY}) [batch ${commits_made}]"
              git push origin "HEAD:$branch"

              if [ "$commits_made" -ge "${MAX_BATCH_COMMITS}" ]; then
                limit_reached=true
                break
              fi
            done
          fi

          compare_url="https://github.com/${UPSTREAM_REPO}/compare/main...${GITHUB_REPOSITORY_OWNER}:$branch?expand=1"
          if [ "$commits_made" -eq 0 ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

          changed_files="$(git diff --name-only upstream/main...HEAD || true)"
          thumbs_changed="$(printf '%s\n' "$changed_files" | grep -c '^docs/thumbnails/' || true)"
          previews_changed="$(printf '%s\n' "$changed_files" | grep -c '^docs/previews/' || true)"
          previews_manifest_changed="$(printf '%s\n' "$changed_files" | grep -c '^docs/previews.json$' || true)"

          echo "batch_commits=$commits_made" >> "$GITHUB_OUTPUT"
          echo "limit_reached=$limit_reached" >> "$GITHUB_OUTPUT"
          echo "thumbs_changed=$thumbs_changed" >> "$GITHUB_OUTPUT"
          echo "previews_changed=$previews_changed" >> "$GITHUB_OUTPUT"
          echo "previews_manifest_changed=$previews_manifest_changed" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "compare_url=$compare_url" >> "$GITHUB_OUTPUT"

      - name: Validate generated preview assets
        env:
          REPO_KEY: ${{ steps.issue.outputs.repo_key }}
        run: |
          npm run validate:previews
          npm run validate:preview-media -- --only-repo-key "${REPO_KEY}" --enforce-dimensions --warn-min-fill "${PREVIEW_WARN_MIN_FILL}" --enforce-min-fill "${PREVIEW_ENFORCE_MIN_FILL}" --warn-min-edge-margin "${PREVIEW_WARN_MIN_EDGE_MARGIN}" --enforce-min-edge-margin "${PREVIEW_ENFORCE_MIN_EDGE_MARGIN}"

      - name: Warn if targeted run produced no media files
        if: steps.target.outputs.selection_mode == 'targeted' && steps.push.outputs.previews_changed == '0' && steps.push.outputs.thumbs_changed == '0'
        run: |
          echo "::warning::Targeted run completed without generating preview/thumbnails media files."
          echo "::warning::Check robot target paths. If you intended full repo regeneration, leave robot_targets empty."

      - name: Summarize detected morphology from previews
        id: morphology
        env:
          REPO_KEY: ${{ steps.issue.outputs.repo_key }}
        run: |
          node -e '
          const fs = require("fs");
          const repoKey = String(process.env.REPO_KEY || "").toLowerCase();
          const pushUnique = (arr, value) => {
            if (!value) return;
            if (!arr.includes(value)) arr.push(value);
          };

          let payload = {};
          try {
            payload = JSON.parse(fs.readFileSync("docs/previews.json", "utf8"));
          } catch {
            payload = {};
          }
          const previews = Array.isArray(payload.previews) ? payload.previews : [];
          const rows = previews.filter((item) => String(item.repoKey || "").toLowerCase() === repoKey);
          const maxValue = (key) =>
            rows.reduce((acc, row) => Math.max(acc, Number(row?.[key] || 0)), 0);

          const armMax = maxValue("armCount");
          const legMax = maxValue("legCount");
          const wheelMax = maxValue("wheelCount");
          const detectedMacro = [];
          if (armMax > 0) {
            pushUnique(detectedMacro, "Arm");
            pushUnique(detectedMacro, "Manipulator");
          }
          if (legMax >= 4) pushUnique(detectedMacro, "Quadruped");
          if (legMax >= 2 && legMax < 4) pushUnique(detectedMacro, "Biped");
          if (armMax >= 2 && legMax >= 2) pushUnique(detectedMacro, "Humanoid");
          if (wheelMax > 0) {
            pushUnique(detectedMacro, "Wheeled");
            pushUnique(detectedMacro, "Mobile");
          }

          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `found=${rows.length > 0 ? "true" : "false"}\n`);
          fs.appendFileSync(out, `preview_count=${rows.length}\n`);
          fs.appendFileSync(out, `arm_max=${armMax}\n`);
          fs.appendFileSync(out, `leg_max=${legMax}\n`);
          fs.appendFileSync(out, `wheel_max=${wheelMax}\n`);
          fs.appendFileSync(
            out,
            `detected_macro_tags=${detectedMacro.length ? detectedMacro.join(", ") : ""}\n`
          );
          '

      - name: Cleanup xacro API
        if: always()
        run: |
          if [ -f /tmp/xacro-api.pid ]; then
            kill "$(cat /tmp/xacro-api.pid)" >/dev/null 2>&1 || true
          fi

      - name: Workflow summary
        run: |
          {
            echo "## Contributor Preview Run";
            echo "";
            echo "- Run mode: \`${{ steps.issue.outputs.mode }}\`";
            echo "- Guide URL: ${{ steps.issue.outputs.issue_url }}";
            echo "- Resolved repoKey: \`${{ steps.issue.outputs.repo_key }}\`";
            if [ "${{ steps.issue.outputs.robot_targets_present }}" = "true" ]; then
              echo "- Robot target lines from workflow input: \`${{ steps.issue.outputs.robot_targets_count }}\`";
              echo "- Resolved target robots: \`${{ steps.target.outputs.resolved_count }}\`";
              if [ "${{ steps.target.outputs.unresolved_count }}" != "0" ]; then
                echo "- Unresolved target lines: \`${{ steps.target.outputs.unresolved_count }}\`";
              fi
            else
              echo "- Robot target lines from workflow input: none";
            fi
            if [ "${{ steps.morphology.outputs.found }}" = "true" ]; then
              echo "- Detected morphology from generated previews (\`${{ steps.morphology.outputs.preview_count }}\` robot(s)): arms<=\`${{ steps.morphology.outputs.arm_max }}\`, legs<=\`${{ steps.morphology.outputs.leg_max }}\`, wheels<=\`${{ steps.morphology.outputs.wheel_max }}\`";
              if [ -n "${{ steps.morphology.outputs.detected_macro_tags }}" ]; then
                echo "- Detected macro tags from preview stats: \`${{ steps.morphology.outputs.detected_macro_tags }}\`";
              else
                echo "- Detected macro tags from preview stats: (none)";
              fi
            else
              echo "- Detected morphology from generated previews: unavailable";
            fi
            echo "- Xacro API: \`${XACRO_API_BASE_URL:-http://127.0.0.1:8000}\`";
            echo "- Branch: \`${{ steps.push.outputs.branch }}\`";
            echo "- Selection mode: \`${{ steps.target.outputs.selection_mode }}\`";
            echo "- Batch size per commit: \`${{ env.PREVIEW_BATCH_SIZE }}\`";
            echo "- Render size: \`${{ env.PREVIEW_RENDER_SIZE }}x${{ env.PREVIEW_RENDER_SIZE }}\`";
            echo "- Framing target NDC: \`${{ env.PREVIEW_FRAMING_TARGET_NDC }}\`";
            echo "- Warn if fill below: \`${{ env.PREVIEW_WARN_MIN_FILL }}\`";
            echo "- Fail if fill below: \`${{ env.PREVIEW_ENFORCE_MIN_FILL }}\`";
            echo "- Warn if edge margin below: \`${{ env.PREVIEW_WARN_MIN_EDGE_MARGIN }}px\`";
            echo "- Fail if edge margin below: \`${{ env.PREVIEW_ENFORCE_MIN_EDGE_MARGIN }}px\`";
            echo "- Batch commits pushed in this run: \`${{ steps.push.outputs.batch_commits }}\`";
            echo "- Changed thumbnails: \`${{ steps.push.outputs.thumbs_changed }}\`";
            echo "- Changed preview animations: \`${{ steps.push.outputs.previews_changed }}\`";
            if [ "${{ steps.target.outputs.selection_mode }}" = "targeted" ] && [ "${{ steps.push.outputs.previews_changed }}" = "0" ] && [ "${{ steps.push.outputs.thumbs_changed }}" = "0" ]; then
              echo "- Warning: targeted run produced no media files. Check target paths; use repo-wide mode by leaving robot targets empty.";
            fi
            if [ "${{ steps.push.outputs.previews_manifest_changed }}" = "0" ]; then
              echo "- \`docs/previews.json\` changed: no";
            else
              echo "- \`docs/previews.json\` changed: yes";
            fi
            echo "- Re-run: open this workflow in your fork and run again with the same repo input.";
            if [ "${{ steps.push.outputs.no_changes }}" = "true" ]; then
              echo "- Result: no preview file changes were produced.";
              echo "- Next step: no PR needed for this run.";
            else
              echo "- Result: preview assets committed to your fork branch.";
              echo "- Open PR URL: ${{ steps.push.outputs.compare_url }}";
              echo "- Review checklist:";
              echo "  1. Review target repo and robot targets.";
              echo "  2. Review compare view.";
              echo "  3. Open PR.";
              if [ "${{ steps.push.outputs.limit_reached }}" = "true" ]; then
                echo "- Note: reached safety limit (\`${{ env.MAX_BATCH_COMMITS }}\` commits). Re-run the workflow with the same repo input to continue.";
              else
                echo "- Next step after merge: re-run with the same repo input until it reports no changes.";
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
