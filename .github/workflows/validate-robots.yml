name: Validate robots.json

on:
  pull_request:
    paths:
      - "docs/robots.json"
      - "docs/robots.schema.json"
      - "docs/scenes/index.json"
      - "docs/scenes.schema.json"
      - "docs/tags.json"
      - "docs/previews.json"
      - "docs/previews.schema.json"
      - "docs/previews/**"
      - "docs/thumbnails/**"
      - "tools/validate-scenes.mjs"
      - "tools/validate-robots.mjs"
      - "tools/validate-previews.mjs"
      - "tools/validate-preview-media.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "docs/robots.json"
      - "docs/robots.schema.json"
      - "docs/scenes/index.json"
      - "docs/scenes.schema.json"
      - "docs/tags.json"
      - "docs/previews.json"
      - "docs/previews.schema.json"
      - "docs/previews/**"
      - "docs/thumbnails/**"
      - "tools/validate-scenes.mjs"
      - "tools/validate-robots.mjs"
      - "tools/validate-previews.mjs"
      - "tools/validate-preview-media.mjs"
      - "package.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate robots.json
        run: npm run validate:robots

      - name: Validate previews.json
        run: npm run validate:previews

      - name: Audit preview media contract
        run: npm run validate:preview-media

      - name: Validate scenes index
        run: npm run validate:scenes
