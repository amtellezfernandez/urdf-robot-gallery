name: Ingest robot repo submissions

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to ingest
        required: true

concurrency:
  group: ingest-robot-repos
  cancel-in-progress: false

jobs:
  ingest:
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.issue.labels.*.name, ','), 'robot-repo') || startsWith(github.event.issue.title || '', 'robot-showcase-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Update robots.json from issue
        id: ingest
        uses: actions/github-script@v7
        with:
          script: |
            const inputIssueNumber = context.payload.inputs?.issue_number;
            const issueNumber = context.payload.issue?.number || (inputIssueNumber ? Number(inputIssueNumber) : null);
            if (!issueNumber) {
              core.setFailed("Missing issue number.");
              return;
            }

            const issue =
              context.payload.issue ||
              (
                await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                })
              ).data;
            const body = issue.body || "";
            const issueOwner = context.repo.owner;
            const issueRepo = context.repo.repo;

            const ensureComment = async (prefix, text) => {
              const comments = await github.rest.issues.listComments({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
              });
              const existing = comments.data.find(
                (comment) =>
                  comment.user &&
                  comment.user.type === "Bot" &&
                  typeof comment.body === "string" &&
                  comment.body.startsWith(prefix)
              );
              if (existing) return;
              await github.rest.issues.createComment({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                body: text,
              });
            };

            const upsertComment = async (prefix, text) => {
              const comments = await github.rest.issues.listComments({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                per_page: 100,
              });
              const existing = comments.data.find(
                (comment) =>
                  comment.user &&
                  comment.user.type === "Bot" &&
                  typeof comment.body === "string" &&
                  comment.body.startsWith(prefix)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: issueOwner,
                  repo: issueRepo,
                  comment_id: existing.id,
                  body: text,
                });
                return;
              }
              await github.rest.issues.createComment({
                owner: issueOwner,
                repo: issueRepo,
                issue_number: issue.number,
                body: text,
              });
            };

            const issueAuthor = issue.user?.login || "";
            const isMaintainer =
              issueAuthor.toLowerCase() === "amtellezfernandez" ||
              issueAuthor.toLowerCase() === "urdf-studio";
            if (!isMaintainer && issueAuthor) {
              const FAILURE_STREAK_LIMIT = 3;
              const NO_URDF_LIMIT = 3;
              const NO_URDF_WINDOW_DAYS = 30;
              const ISSUE_LOOKBACK = 20;
              const noUrdfSince = new Date(
                Date.now() - NO_URDF_WINDOW_DAYS * 24 * 60 * 60 * 1000
              );
              const recentIssues = await github.rest.issues.listForRepo({
                owner: issueOwner,
                repo: issueRepo,
                creator: issueAuthor,
                labels: "robot-repo",
                state: "all",
                per_page: ISSUE_LOOKBACK,
                sort: "created",
                direction: "desc",
              });

              const FAILURE_PREFIXES = [
                "Auto-ingest: no .urdf files were detected",
                "Auto-ingest: missing GitHub repo URL.",
                "Auto-ingest: couldn't parse repo URL:",
                "Auto-ingest: couldn't access",
              ];
              const SUCCESS_PREFIX = "Auto-ingest: updated robots.json on main.";

              const getOutcome = async (issueNumber, createdAt) => {
                const comments = await github.rest.issues.listComments({
                  owner: issueOwner,
                  repo: issueRepo,
                  issue_number: issueNumber,
                  per_page: 100,
                });
                const bodies = (comments.data || []).map((comment) => comment.body || "");
                const hasSuccess = bodies.some((body) => body.startsWith(SUCCESS_PREFIX));
                const hasFailure = bodies.some((body) =>
                  FAILURE_PREFIXES.some((prefix) => body.startsWith(prefix))
                );
                const hasNoUrdf = bodies.some((body) =>
                  body.startsWith("Auto-ingest: no .urdf files were detected")
                );
                const createdDate = createdAt ? new Date(createdAt) : null;
                const inNoUrdfWindow = createdDate ? createdDate >= noUrdfSince : false;
                return {
                  success: hasSuccess,
                  failure: hasFailure,
                  noUrdf: hasNoUrdf && inNoUrdfWindow,
                };
              };

              let failureStreak = 0;
              let noUrdfCount = 0;
              for (const item of recentIssues.data || []) {
                if (item.pull_request) continue;
                if (item.number === issue.number) continue;
                const outcome = await getOutcome(item.number, item.created_at);
                if (outcome.noUrdf) noUrdfCount += 1;
                if (outcome.success) break;
                if (outcome.failure) {
                  failureStreak += 1;
                  if (failureStreak >= FAILURE_STREAK_LIMIT) break;
                  continue;
                }
                if (failureStreak > 0) break;
              }

              if (failureStreak >= FAILURE_STREAK_LIMIT || noUrdfCount >= NO_URDF_LIMIT) {
                await ensureComment(
                  "Auto-ingest: repeated failed submissions.",
                  `Auto-ingest: repeated failed submissions from ${issueAuthor}. ` +
                    "This submission will be reviewed manually by a maintainer."
                );
                return;
              }
            }

            const clean = (value) => {
              if (!value) return "";
              const trimmed = value.trim();
              if (!trimmed || trimmed.toLowerCase() === "no response" || trimmed === "_No response_") {
                return "";
              }
              return trimmed;
            };

            const parseIssueFields = (text) => {
              const fields = {};
              const regex = /^###\s+(.+)\n+([\s\S]*?)(?=^###\s+|\Z)/gm;
              let match;
              while ((match = regex.exec(text)) !== null) {
                fields[match[1].trim()] = clean(match[2]);
              }
              return fields;
            };

            const parseRepoUrl = (url) => {
              if (!url) return { error: "missing" };
              let normalized = url.trim();
              if (!normalized) return { error: "missing" };

              const mdMatch = normalized.match(/\((https?:\/\/github\.com\/[^)]+)\)/);
              if (mdMatch) {
                normalized = mdMatch[1];
              }

              normalized = normalized.replace(/\.git$/i, "").replace(/\/+$/, "");

              if (normalized.startsWith("github.com/") || normalized.startsWith("www.github.com/")) {
                normalized = `https://${normalized.replace(/^www\./, "")}`;
              }

              const sshMatch = normalized.match(/^git@github\.com:([^/]+)\/(.+?)(?:\.git)?$/i);
              if (sshMatch) {
                return { owner: sshMatch[1], repo: sshMatch[2].replace(/\.git$/i, ""), path: "" };
              }

              if (!normalized.includes("github.com")) {
                const parts = normalized.split("/").filter(Boolean);
                if (parts.length === 1) {
                  return { error: "missing-repo", owner: parts[0] };
                }
                if (parts.length >= 2) {
                  return { owner: parts[0], repo: parts[1], path: parts.slice(2).join("/") || "" };
                }
                return { error: "invalid" };
              }

              try {
                const urlObj = new URL(normalized);
                const parts = urlObj.pathname.split("/").filter(Boolean);
                if (parts.length === 1) {
                  return { error: "missing-repo", owner: parts[0] };
                }
                if (parts.length < 2) return { error: "invalid" };
                const owner = parts[0];
                const repo = parts[1].replace(/\.git$/i, "");
                let path = "";
                if (parts.length > 2 && parts[2] === "tree") {
                  if (parts.length > 4) {
                    path = parts.slice(4).join("/");
                  }
                } else if (parts.length > 2) {
                  path = parts.slice(2).join("/");
                }
                return { owner, repo, path };
              } catch {
                return { error: "invalid" };
              }
            };

            const parseLines = (value) =>
              value
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean);

            const parseTags = (value) => {
              if (!value) return [];
              return value
                .split(/[,\n]/)
                .map((tag) => tag.trim())
                .filter(Boolean);
            };

            const normalizeLicense = (value) => {
              const raw = String(value || "").trim();
              if (!raw || raw.toUpperCase() === "NOASSERTION") return "No license";
              return raw;
            };

            const SUPPORTED_ROBOT_EXTENSIONS = [".urdf.xacro", ".xacro", ".urdf"];
            const KNOWN_MESH_EXTENSIONS = [".stl", ".dae", ".obj", ".ply", ".glb", ".gltf", ".fbx"];

            const isSupportedRobotFile = (value) => {
              const normalized = String(value || "").toLowerCase();
              return SUPPORTED_ROBOT_EXTENSIONS.some((ext) => normalized.endsWith(ext));
            };

            const stripSupportedRobotExtension = (value) => {
              const normalized = String(value || "");
              const lowered = normalized.toLowerCase();
              for (const ext of SUPPORTED_ROBOT_EXTENSIONS) {
                if (lowered.endsWith(ext)) {
                  return normalized.slice(0, normalized.length - ext.length);
                }
              }
              return normalized;
            };

            const slugify = (value) =>
              value
                .trim()
                .replace(/\.urdf\.xacro$/i, "")
                .replace(/\.xacro$/i, "")
                .replace(/\.urdf$/i, "")
                .replace(/[^a-zA-Z0-9._-]+/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "")
                .toLowerCase();

            const hashString = (value) => {
              let hash = 2166136261;
              for (let i = 0; i < value.length; i += 1) {
                hash ^= value.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
              }
              return (hash >>> 0).toString(36);
            };

            const toPreviewBase = (value) => {
              const normalized = stripSupportedRobotExtension(value.replace(/\\/g, "/"));
              const name = normalized.split("/").pop() || normalized;
              const slug = slugify(name) || "robot";
              return `${slug}--${hashString(normalized)}`;
            };

            const normalizeTagKey = (value) =>
              value
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "")
                .trim();

            const pushUnique = (array, value) => {
              if (!value) return;
              if (!array.includes(value)) array.push(value);
            };

            const inferSuggestedTagsFromPath = (value) => {
              const tags = [];
              const text = String(value || "").toLowerCase();
              if (!text) return tags;

              if (/(humanoid|anthro|atlas|talos|nao)/i.test(text)) pushUnique(tags, "Humanoid");
              if (/(quadruped|quad|dog|spot|anymal|go1|go2|a1|mini[_-]?cheetah)/i.test(text)) {
                pushUnique(tags, "Quadruped");
              }
              if (/(biped|two[_-]?leg|2leg)/i.test(text)) pushUnique(tags, "Biped");
              if (/(dual[_-]?arm|2[_-]?arm|two[_-]?arm|baxter|yumi|nextage|torso)/i.test(text)) {
                pushUnique(tags, "Dual Arm");
              }
              if (/(gripper|claw|end[_-]?effector|eef|hand|dexterous)/i.test(text)) {
                pushUnique(tags, "End Effector");
              }
              if (/(arm|manipulator|franka|kinova|jaco|xarm|ur[0-9]|so[_-]?arm|iiwa|panda)/i.test(text)) {
                pushUnique(tags, "Arm");
              }
              const hasWheels = /(wheel|wheeled|diff[_-]?drive|ackermann|caster|mecanum|omni|rover|ugv|mobile[_-]?base|base)/i.test(
                text
              );
              const hasManipulator = /(arm|manipulator|franka|kinova|jaco|xarm|ur[0-9]|iiwa|panda|gripper|end[_-]?effector)/i.test(
                text
              );
              if (hasWheels) {
                pushUnique(tags, "Wheeled");
              }
              if (hasWheels && hasManipulator) {
                pushUnique(tags, "Mobile Manipulator");
              }
              if (/(drone|uav|quadrotor|multirotor|aerial)/i.test(text)) pushUnique(tags, "Drone");
              if (/(object|cube|box|sphere|cylinder|table|desk|chair|bottle|can|cup|plate|pan|obstacle|prop)/i.test(text)) {
                pushUnique(tags, "Object");
              }
              return tags;
            };

            const inferRepoSuggestedTags = (paths) => {
              const inferred = [];
              for (const filePath of Array.isArray(paths) ? paths : []) {
                const defaultName = stripSupportedRobotExtension(filePath.split("/").pop() || filePath);
                const tags = inferSuggestedTagsFromPath(`${filePath} ${defaultName}`);
                for (const tag of tags) pushUnique(inferred, tag);
              }
              return inferred;
            };

            const TAG_ALIASES = new Map([
              ["lerobot", "Other"],
              ["arms", "Arm"],
              ["arm", "Arm"],
              ["manipulator", "Arm"],
              ["manipulators", "Arm"],
              ["bipeds", "Biped"],
              ["biped", "Biped"],
              ["dualarms", "Dual Arm"],
              ["dualarm", "Dual Arm"],
              ["endeffectors", "End Effector"],
              ["endeffector", "End Effector"],
              ["grippers", "End Effector"],
              ["gripper", "End Effector"],
              ["hands", "End Effector"],
              ["hand", "End Effector"],
              ["humanoids", "Humanoid"],
              ["humanoid", "Humanoid"],
              ["mobilemanipulators", "Mobile Manipulator"],
              ["mobilemanipulator", "Mobile Manipulator"],
              ["mobile", "Mobile Manipulator"],
              ["mobilebase", "Mobile Manipulator"],
              ["quadrupeds", "Quadruped"],
              ["quadruped", "Quadruped"],
              ["dogs", "Quadruped"],
              ["dog", "Quadruped"],
              ["drones", "Drone"],
              ["drone", "Drone"],
              ["aerial", "Drone"],
              ["object", "Object"],
              ["objects", "Object"],
              ["tracked", "Wheeled"],
              ["track", "Wheeled"],
              ["rover", "Wheeled"],
              ["ugv", "Wheeled"],
              ["wheeled", "Wheeled"],
            ]);

            const canonicalizeTags = (tags, allowedTagMap) => {
              const normalized = [];
              const invalid = [];
              for (const tag of Array.isArray(tags) ? tags : []) {
                const key = normalizeTagKey(tag);
                const canonical = TAG_ALIASES.get(key) || allowedTagMap.get(key);
                if (!canonical) {
                  invalid.push(tag);
                  continue;
                }
                if (!normalized.includes(canonical)) {
                  normalized.push(canonical);
                }
              }
              return { normalized, invalid };
            };

            const parseRobotMapping = (value) => {
              if (!value) return [];
              const lines = parseLines(value);
              const robots = [];
              for (const [index, line] of lines.entries()) {
                let name = "";
                let file = "";
                const separators = [" — ", " – ", " - ", " —", " –", " -"];
                let splitAt = -1;
                let splitBy = "";
                for (const sep of separators) {
                  const foundAt = line.indexOf(sep);
                  if (foundAt > -1) {
                    splitAt = foundAt;
                    splitBy = sep;
                    break;
                  }
                }
                if (splitAt < 0 && line.includes(":")) {
                  splitAt = line.indexOf(":");
                  splitBy = ":";
                }
                if (splitAt >= 0) {
                  name = line.slice(0, splitAt).trim();
                  file = line.slice(splitAt + splitBy.length).trim();
                } else {
                  name = line.trim();
                }
                if (!name && !file) continue;
                if (file) {
                  const fallbackName = stripSupportedRobotExtension(file.split("/").pop() || file);
                  robots.push({
                    name: name || fallbackName,
                    file,
                    rawLine: line,
                    lineNumber: index + 1,
                  });
                } else {
                  robots.push({ name, rawLine: line, lineNumber: index + 1 });
                }
              }
              return robots;
            };

            const normalizeRelativePath = (value) =>
              String(value || "")
                .trim()
                .replace(/\\/g, "/")
                .replace(/^\.\//, "")
                .replace(/^\/+/, "")
                .replace(/\/+/g, "/");

            const mergeRobotsPreserveExisting = (previous, detected) => {
              const toKey = (robot) => {
                if (!robot) return "";
                if (typeof robot === "string") return robot.trim().toLowerCase();
                return String(robot.fileBase || robot.file || robot.name || "")
                  .trim()
                  .toLowerCase();
              };
              const toObject = (robot) => {
                if (!robot) return null;
                if (typeof robot === "string") {
                  const name = robot.trim();
                  if (!name) return null;
                  return { name };
                }
                return { ...robot };
              };

              const merged = [];
              const indexByKey = new Map();
              const append = (robot) => {
                const asObject = toObject(robot);
                if (!asObject) return;
                const key = toKey(asObject);
                if (!key) return;
                if (!indexByKey.has(key)) {
                  indexByKey.set(key, merged.length);
                  merged.push(asObject);
                  return;
                }
                const idx = indexByKey.get(key);
                const prev = merged[idx] || {};
                merged[idx] = {
                  ...asObject,
                  ...prev,
                  name: prev.name || asObject.name,
                  file: prev.file || asObject.file,
                  fileBase: prev.fileBase || asObject.fileBase,
                };
              };

              (Array.isArray(previous) ? previous : []).forEach(append);
              (Array.isArray(detected) ? detected : []).forEach(append);
              return merged;
            };

            const normalizeRepoKey = (value) =>
              value
                ? value
                    .replace(/^https?:\/\/github\.com\//, "")
                    .split("/")
                    .slice(0, 2)
                    .join("/")
                    .toLowerCase()
                : "";

            const fetchGalleryJson = async (filePath, fallback) => {
              try {
                const file = await github.rest.repos.getContent({
                  owner: galleryOwner,
                  repo: galleryRepo,
                  path: filePath,
                  ref: galleryDefaultBranch,
                });
                if (!Array.isArray(file.data) && file.data.content) {
                  const decoded = Buffer.from(file.data.content, "base64").toString("utf8");
                  return JSON.parse(decoded);
                }
              } catch {
                // ignore
              }
              return fallback;
            };

            const fetchGallerySha = async (filePath) => {
              try {
                const file = await github.rest.repos.getContent({
                  owner: galleryOwner,
                  repo: galleryRepo,
                  path: filePath,
                  ref: galleryDefaultBranch,
                });
                if (!Array.isArray(file.data)) {
                  return file.data.sha || null;
                }
              } catch {
                // ignore
              }
              return null;
            };

            const fields = parseIssueFields(body);
            let repoUrl =
              clean(fields["GitHub repo (URL or owner/repo)"]) || clean(fields["GitHub repo URL"]);
            const mappingInputValue = clean(fields["Robot mapping (optional)"]);
            if (!repoUrl) {
              const match = body.match(/https?:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+(?:\/[^\s\)]*)?/);
              if (match) {
                repoUrl = match[0];
              }
            }
            if (!repoUrl) {
              await ensureComment(
                "Auto-ingest: missing GitHub repo URL.",
                "Auto-ingest: missing GitHub repo input. Please provide owner/repo or a full GitHub URL."
              );
              return;
            }

            const repoInfo = parseRepoUrl(repoUrl);
            if (!repoInfo || repoInfo.error) {
              const errorMessage =
                repoInfo && repoInfo.error === "missing-repo"
                  ? `Auto-ingest: please provide owner/repo or full GitHub URL. I received an org-only value: ${repoUrl}\nExamples:\n- TheRobotStudio/SO-ARM100\n- https://github.com/TheRobotStudio/SO-ARM100`
                  : `Auto-ingest: couldn't parse repo input: ${repoUrl}\nPlease provide owner/repo or a full GitHub URL.`;
              await ensureComment("Auto-ingest: couldn't parse repo URL:", errorMessage);
              return;
            }

            const { owner, repo, path: submittedPath } = repoInfo;
            const desiredTitle = `robot-showcase-request: ${owner}/${repo}`;
            if ((issue.title || "").trim() !== desiredTitle) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  title: desiredTitle,
                });
              } catch {
                // Non-fatal if title update fails.
              }
            }
            const galleryOwner = context.repo.owner;
            const galleryRepo = context.repo.repo;
            const galleryInfo = await github.rest.repos.get({
              owner: galleryOwner,
              repo: galleryRepo,
            });
            const galleryDefaultBranch = galleryInfo.data.default_branch || "main";

            let existing = [];
            let existingSha = null;
            try {
              const file = await github.rest.repos.getContent({
                owner: galleryOwner,
                repo: galleryRepo,
                path: "docs/robots.json",
                ref: galleryDefaultBranch,
              });
              if (!Array.isArray(file.data) && file.data.content) {
                const decoded = Buffer.from(file.data.content, "base64").toString("utf8");
                existing = JSON.parse(decoded);
                existingSha = file.data.sha;
              }
            } catch {
              existing = [];
            }

            const allowedTags = await fetchGalleryJson("docs/tags.json", []);
            const allowedTagMap = new Map(
              (Array.isArray(allowedTags) ? allowedTags : []).map((tag) => [normalizeTagKey(tag), tag])
            );
            const allowedTagList = Array.isArray(allowedTags) ? allowedTags : [];

            const repoKeyCandidate = `${owner}/${repo}`.toLowerCase();
            const existingRepoIndex = existing.findIndex(
              (item) => normalizeRepoKey(item.repo || item.repoKey) === repoKeyCandidate
            );
            const repoAlreadyIncluded = existingRepoIndex >= 0;
            if (repoAlreadyIncluded) {
              core.info(
                `Repo ${owner}/${repo} already exists in docs/robots.json; refreshing robots for that existing entry.`
              );
            }

            let defaultBranch = "main";
            let detectedLicense = "No license";
            try {
              const repoData = await github.rest.repos.get({ owner, repo });
              defaultBranch = repoData.data.default_branch || "main";
              detectedLicense = normalizeLicense(
                repoData?.data?.license?.spdx_id || repoData?.data?.license?.name || ""
              );
            } catch (error) {
              await ensureComment(
                "Auto-ingest: couldn't access",
                `Auto-ingest: couldn't access ${owner}/${repo}.`
              );
              return;
            }

            let hasWriteAccess = false;
            if (!isMaintainer && issueAuthor) {
              try {
                const permission = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: issueAuthor,
                });
                const level = permission?.data?.permission || "";
                hasWriteAccess = ["admin", "maintain", "write"].includes(level);
              } catch {
                hasWriteAccess = false;
              }
            }
            if (!repoAlreadyIncluded && !isMaintainer && !hasWriteAccess) {
              await ensureComment(
                "Auto-ingest: manual review required.",
                `Auto-ingest: manual review required. ${issueAuthor || "The submitter"} does not appear to have write access to ${owner}/${repo}. ` +
                  "This submission will be reviewed manually by a maintainer. " +
                  "Preview generation is deferred until a maintainer approves and ingests this entry."
              );
              return;
            }

            const fetchFullRepoTree = async () => {
              try {
                const recursiveTree = await github.rest.git.getTree({
                  owner,
                  repo,
                  tree_sha: defaultBranch,
                  recursive: "1",
                });
                const entries = recursiveTree.data.tree || [];
                if (!recursiveTree.data.truncated) {
                  return entries;
                }
                core.info(
                  `Recursive tree is truncated for ${owner}/${repo}; falling back to non-recursive traversal.`
                );
              } catch (error) {
                core.info(
                  `Recursive tree fetch failed for ${owner}/${repo}: ${error.message || error}. Falling back to non-recursive traversal.`
                );
              }

              const rootTree = await github.rest.git.getTree({
                owner,
                repo,
                tree_sha: defaultBranch,
              });
              const queue = [];
              const blobs = [];
              const rootEntries = rootTree.data.tree || [];
              for (const entry of rootEntries) {
                if (!entry?.path) continue;
                if (entry.type === "blob") {
                  blobs.push({ path: entry.path, type: "blob" });
                } else if (entry.type === "tree" && entry.sha) {
                  queue.push({ sha: entry.sha, prefix: entry.path });
                }
              }

              const MAX_TREE_REQUESTS = 5000;
              let treeRequests = 1;
              while (queue.length > 0) {
                const current = queue.shift();
                if (!current) continue;
                treeRequests += 1;
                if (treeRequests > MAX_TREE_REQUESTS) {
                  throw new Error(
                    `Repo traversal exceeded ${MAX_TREE_REQUESTS} tree requests for ${owner}/${repo}.`
                  );
                }

                const subtree = await github.rest.git.getTree({
                  owner,
                  repo,
                  tree_sha: current.sha,
                });
                for (const child of subtree.data.tree || []) {
                  if (!child?.path) continue;
                  const fullPath = `${current.prefix}/${child.path}`;
                  if (child.type === "blob") {
                    blobs.push({ path: fullPath, type: "blob" });
                  } else if (child.type === "tree" && child.sha) {
                    queue.push({ sha: child.sha, prefix: fullPath });
                  }
                }
              }
              return blobs;
            };

            if (submittedPath) {
              core.info(
                `Submission included path "${submittedPath}", but auto-ingest scans the full repository ${owner}/${repo}.`
              );
            }

            const tree = await fetchFullRepoTree();
            const urdfFiles = tree
              .filter((entry) => entry.type === "blob" && isSupportedRobotFile(entry.path))
              .map((entry) => entry.path);
            if (urdfFiles.length === 0) {
              const altFormats = [".sdf", ".mjcf", ".xml", ...KNOWN_MESH_EXTENSIONS];
              const foundAlt = tree
                .filter((entry) => entry.type === "blob")
                .map((entry) => entry.path.toLowerCase())
                .filter((path) => altFormats.some((ext) => path.endsWith(ext)));
              const altHint = foundAlt.length
                ? `Detected non-URDF/Xacro files: ${foundAlt.slice(0, 5).join(", ")}. `
                : "";
              await ensureComment(
                "Auto-ingest: no .urdf/.xacro files were detected",
                `Auto-ingest: no .urdf/.xacro files were detected in ${owner}/${repo}. ` +
                  altHint +
                  "Mesh files (.stl/.dae/.obj/...) are supported as assets, but a URDF/Xacro root file is still required. " +
                  "Please add a URDF/Xacro and re-open this issue."
              );
              return;
            }

            const sortedUrdfFiles = [...urdfFiles].sort((a, b) =>
              a.localeCompare(b, undefined, { sensitivity: "base" })
            );
            const suggestedMappingLines = sortedUrdfFiles.map((filePath) => {
              const defaultName = stripSupportedRobotExtension(filePath.split("/").pop() || filePath);
              return `${defaultName} — ${filePath}`;
            });
            const suggestedTagLines = sortedUrdfFiles.map((filePath) => {
              const defaultName = stripSupportedRobotExtension(filePath.split("/").pop() || filePath);
              const suggestedTags = inferSuggestedTagsFromPath(`${filePath} ${defaultName}`);
              return `${defaultName} — ${filePath} | tags: ${suggestedTags.length ? suggestedTags.join(", ") : "(none)"}`;
            });
            const detectedMacroTags = inferRepoSuggestedTags(sortedUrdfFiles);
            const detectedPrefix = "Auto-ingest: detected URDF/Xacro files.";
            const maxCommentChars = 62000;
            let listLines = sortedUrdfFiles;
            let mappingLines = suggestedMappingLines;
            let tagLines = suggestedTagLines;
            let omittedCount = 0;
            let detectedComment = "";
            while (true) {
              const linesText = listLines.join("\n");
              const mappingText = mappingLines.join("\n");
              const tagsText = tagLines.join("\n");
              const omittedNotice =
                omittedCount > 0
                  ? `\n\nNote: ${omittedCount} additional file(s) were omitted from this comment due to GitHub comment size limits.`
                  : "";
              detectedComment =
                `${detectedPrefix}\n\n` +
                `Detected **${sortedUrdfFiles.length}** URDF/Xacro file(s) in \`${owner}/${repo}\`.\n` +
                "Use exact paths in mapping.\n\n" +
                `Detected repo-level macro tags (heuristic): ${
                  detectedMacroTags.length ? detectedMacroTags.join(", ") : "(none)"
                }\n\n` +
                "<details>\n<summary>Detected robot root files</summary>\n\n" +
                "```text\n" +
                `${linesText}\n` +
                "```\n</details>\n\n" +
                "<details>\n<summary>Suggested mapping (copy, edit names, paste into issue)</summary>\n\n" +
                "```text\n" +
                `${mappingText}\n` +
                "```\n</details>\n\n" +
                "<details>\n<summary>Suggested per-file tags (heuristic)</summary>\n\n" +
                "```text\n" +
                `${tagsText}\n` +
                "```\n</details>" +
                omittedNotice;
              if (detectedComment.length <= maxCommentChars || listLines.length <= 1) {
                break;
              }
              omittedCount += 1;
              listLines = listLines.slice(0, -1);
              mappingLines = mappingLines.slice(0, -1);
              tagLines = tagLines.slice(0, -1);
            }
            await upsertComment(detectedPrefix, detectedComment);

            const rawTags = parseTags(clean(fields["Tags (optional)"]));
            const { normalized: correctedTags, invalid: invalidTags } = canonicalizeTags(rawTags, allowedTagMap);
            if (invalidTags.length > 0) {
              const allowedText = allowedTagList.length
                ? `Allowed tags: ${allowedTagList.join(", ")}.`
                : "Allowed tags list is unavailable.";
              await ensureComment(
                "Auto-ingest: invalid tags.",
                `Auto-ingest: invalid tags provided: ${invalidTags.join(", ")}. ${allowedText}`
              );
              return;
            }
            const { normalized: detectedCanonicalTags } = canonicalizeTags(
              detectedMacroTags,
              allowedTagMap
            );
            const normalizedTags =
              correctedTags.length > 0
                ? correctedTags
                : detectedCanonicalTags.length > 0
                  ? detectedCanonicalTags
                  : ["Other"];
            await upsertComment(
              "Auto-ingest: tag reconciliation.",
              "Auto-ingest: tag reconciliation.\n\n" +
                `Detected macro tags (heuristic): ${
                  detectedCanonicalTags.length ? detectedCanonicalTags.join(", ") : "(none)"
                }\n` +
                `Issue tags (**Tags (optional)**): ${
                  correctedTags.length ? correctedTags.join(", ") : "(none provided)"
                }\n` +
                `Applied tags in robots.json: ${
                  normalizedTags.length ? normalizedTags.join(", ") : "(none)"
                }\n\n` +
                (correctedTags.length > 0
                  ? "Applied issue tags."
                  : detectedCanonicalTags.length > 0
                    ? "No issue tags provided; applied detected macro tags."
                    : "No issue tags provided and no detection matched; applied Other.")
            );

            const mapping = parseRobotMapping(mappingInputValue);
            const urdfPathLookup = new Map();
            const urdfFileNameLookup = new Map();
            for (const filePath of urdfFiles) {
              const normalizedPath = normalizeRelativePath(filePath).toLowerCase();
              const fileName = normalizedPath.split("/").pop() || normalizedPath;
              urdfPathLookup.set(normalizedPath, filePath);
              if (!urdfFileNameLookup.has(fileName)) urdfFileNameLookup.set(fileName, []);
              urdfFileNameLookup.get(fileName).push(filePath);
            }
            const buildCandidates = (value) => {
              const normalized = normalizeRelativePath(value).toLowerCase();
              if (!normalized) return [];
              const candidates = new Set([normalized]);
              if (!isSupportedRobotFile(normalized)) {
                for (const ext of SUPPORTED_ROBOT_EXTENSIONS) {
                  candidates.add(`${normalized}${ext}`);
                }
              }
              return [...candidates];
            };
            const mappedRobots = [];
            const mappedFileKeys = new Set();
            const mappingWarnings = [];
            if (mapping.length > 0) {
              for (const robot of mapping) {
                const lineNumber = robot.lineNumber || "?";
                const rawLine = robot.rawLine || `${robot.name || ""}${robot.file ? ` — ${robot.file}` : ""}`.trim();
                const rawFile = (robot.file || "").trim();
                if (!rawFile) {
                  mappingWarnings.push(
                    `line ${lineNumber}: "${rawLine}" was ignored because no URDF file was provided. Use "RobotName — file.urdf".`
                  );
                  continue;
                }

                const normalizedFile = normalizeRelativePath(rawFile);
                const isPathLike = normalizedFile.includes("/");
                const actualMatches = [];

                if (isPathLike) {
                  const pathCandidates = buildCandidates(normalizedFile);
                  for (const candidate of pathCandidates) {
                    const matched = urdfPathLookup.get(candidate);
                    if (matched) actualMatches.push(matched);
                  }
                } else {
                  const fileCandidates = buildCandidates(normalizedFile).map(
                    (candidate) => candidate.split("/").pop() || candidate
                  );
                  for (const candidate of fileCandidates) {
                    const matches = urdfFileNameLookup.get(candidate);
                    if (matches && matches.length) {
                      actualMatches.push(...matches);
                    }
                  }
                }

                const uniqueMatches = [...new Set(actualMatches)].sort((a, b) =>
                  a.localeCompare(b, undefined, { sensitivity: "base" })
                );

                if (uniqueMatches.length === 0) {
                  mappingWarnings.push(
                    `line ${lineNumber}: "${rawLine}" did not match any detected URDF/Xacro file.`
                  );
                  continue;
                }

                if (uniqueMatches.length > 1) {
                  const previewMatches = uniqueMatches.slice(0, 5).join(", ");
                  const extra = uniqueMatches.length > 5 ? ` (+${uniqueMatches.length - 5} more)` : "";
                  mappingWarnings.push(
                    `line ${lineNumber}: "${rawLine}" is ambiguous (${previewMatches}${extra}). Use a path like subdir/file.urdf.`
                  );
                  continue;
                }

                const actualPath = uniqueMatches[0];
                const baseName = stripSupportedRobotExtension(actualPath.split("/").pop() || actualPath);
                const name = (robot.name || baseName).trim();
                const fileName = actualPath.split("/").pop() || actualPath;
                const fileBase = toPreviewBase(actualPath);
                mappedRobots.push({ name, file: fileName, fileBase });
                // Track both full path and basename to avoid duplicate mapped/detected entries.
                mappedFileKeys.add(actualPath.toLowerCase());
                mappedFileKeys.add(fileName.toLowerCase());
                mappedFileKeys.add(fileBase.toLowerCase());
              }
            }

            if (mappingWarnings.length > 0) {
              const displayedWarnings = mappingWarnings.slice(0, 20).map((warning) => `- ${warning}`).join("\n");
              const moreWarnings =
                mappingWarnings.length > 20 ? `\n- ...and ${mappingWarnings.length - 20} more warning(s).` : "";
              await upsertComment(
                "Auto-ingest: robot mapping warnings.",
                "Auto-ingest: robot mapping warnings.\n" +
                  "Some mapping rows were ignored; ingest continued with detected robots.\n" +
                  "Accepted formats:\n" +
                  "- RobotName — file.urdf\n" +
                  "- RobotName — subdir/file.urdf\n\n" +
                  `${displayedWarnings}${moreWarnings}`
              );
            } else if (mappingInputValue) {
              await upsertComment(
                "Auto-ingest: robot mapping warnings.",
                "Auto-ingest: robot mapping warnings.\nNo mapping warnings in the latest run."
              );
            }

            const detectedRobots = urdfFiles.map((filePath) => ({
              name: stripSupportedRobotExtension(filePath.split("/").pop() || filePath),
              file: filePath.split("/").pop() || filePath,
              fileBase: toPreviewBase(filePath),
            }));
            const robotsRaw =
              mapping.length > 0
                ? [
                    ...mappedRobots,
                    ...detectedRobots.filter(
                      (robot) =>
                        !mappedFileKeys.has((robot.file || "").toLowerCase()) &&
                        !mappedFileKeys.has((robot.fileBase || "").toLowerCase())
                    ),
                  ]
                : detectedRobots;
            const seenRobotKeys = new Set();
            const robots = robotsRaw.filter((robot) => {
              const dedupeKey = (robot.fileBase || robot.file || "").toLowerCase();
              if (!dedupeKey || seenRobotKeys.has(dedupeKey)) return false;
              seenRobotKeys.add(dedupeKey);
              return true;
            });

            const entry = {
              repo: `https://github.com/${owner}/${repo}`,
              repoKey: `${owner}/${repo}`.toLowerCase(),
              org: clean(fields["Author / Company / Lab (optional)"]),
              summary: clean(fields["Short summary"]),
              demo: clean(fields["Demo URL (optional)"]),
              tags: normalizedTags,
              license: detectedLicense,
              robots: robots.length ? robots : undefined,
              hfDatasets: parseLines(clean(fields["Hugging Face datasets (one per line, optional)"])),
              authorWebsite: clean(fields["Author website (optional)"]),
              authorX: clean(fields["Author X/Twitter (optional)"]),
              authorLinkedin: clean(fields["Author LinkedIn (optional)"]),
              authorGithub: clean(fields["Author GitHub (optional)"]),
              contact: clean(fields["Contact (optional)"]),
              extra: clean(fields["Extra links or notes (optional)"]),
              updatedAt: new Date().toISOString(),
            };

            const repoKey = entry.repoKey;
            const idx = existing.findIndex((item) => normalizeRepoKey(item.repo || item.repoKey) === repoKey);
            let previousRobotCount = 0;
            let refreshedRobotCount = Array.isArray(entry.robots) ? entry.robots.length : 0;
            if (idx >= 0) {
              const prev = existing[idx];
              previousRobotCount = Array.isArray(prev.robots) ? prev.robots.length : 0;
              const mergeValue = (value, fallback) => (value !== undefined && value !== "" ? value : fallback);
              const mergeArray = (value, fallback) => (Array.isArray(value) && value.length ? value : fallback);
              const mergedRobots = mergeRobotsPreserveExisting(prev.robots, entry.robots);
              existing[idx] = {
                ...prev,
                repo: entry.repo || prev.repo,
                repoKey,
                path: undefined,
                org: mergeValue(entry.org, prev.org),
                summary: mergeValue(entry.summary, prev.summary),
                demo: mergeValue(entry.demo, prev.demo),
                tags: mergeArray(entry.tags, prev.tags),
                license: mergeValue(entry.license, prev.license),
                robots: mergeArray(mergedRobots, prev.robots),
                hfDatasets: mergeArray(entry.hfDatasets, prev.hfDatasets),
                authorWebsite: mergeValue(entry.authorWebsite, prev.authorWebsite),
                authorX: mergeValue(entry.authorX, prev.authorX),
                authorLinkedin: mergeValue(entry.authorLinkedin, prev.authorLinkedin),
                authorGithub: mergeValue(entry.authorGithub, prev.authorGithub),
                contact: mergeValue(entry.contact, prev.contact),
                extra: mergeValue(entry.extra, prev.extra),
                updatedAt: entry.updatedAt,
              };
              refreshedRobotCount = Array.isArray(existing[idx].robots) ? existing[idx].robots.length : 0;
            } else {
              existing.unshift(entry);
            }

            const content = Buffer.from(JSON.stringify(existing, null, 2)).toString("base64");
            await github.rest.repos.createOrUpdateFileContents({
              owner: galleryOwner,
              repo: galleryRepo,
              path: "docs/robots.json",
              message: `Update robots.json from issue #${issue.number}`,
              content,
              sha: existingSha || undefined,
              branch: galleryDefaultBranch,
            });

            const meta = {
              version: 1,
              generatedAt: new Date().toISOString(),
              count: existing.length,
            };
            const metaSha = await fetchGallerySha("docs/robots.meta.json");
            await github.rest.repos.createOrUpdateFileContents({
              owner: galleryOwner,
              repo: galleryRepo,
              path: "docs/robots.meta.json",
              message: `Update robots.meta.json from issue #${issue.number}`,
              content: Buffer.from(JSON.stringify(meta, null, 2)).toString("base64"),
              sha: metaSha || undefined,
              branch: galleryDefaultBranch,
            });

            const dispatchPayload = {
              issueNumber: issue.number,
              repo: entry.repo,
            };

            const addedRobots = Math.max(0, refreshedRobotCount - previousRobotCount);
            const successComment =
              idx >= 0
                ? addedRobots > 0
                  ? `Auto-ingest: ${owner}/${repo} was already in the gallery. Refreshed the existing entry and found ${addedRobots} new robot(s). Issue closed.`
                  : `Auto-ingest: ${owner}/${repo} is already in the gallery. Refreshed the existing entry and found no additional robots. Issue closed.`
                : "Auto-ingest: updated robots.json on main. This entry is now live.";
            const suggestedForkOwner = issueAuthor || "<your-github-username>";
            const forkWorkflowUrl = `https://github.com/${suggestedForkOwner}/${galleryRepo}/actions/workflows/contributor-generate-previews.yml`;
            const safeRepoBranch = repoKey
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "");
            const compareUrl = `https://github.com/${galleryOwner}/${galleryRepo}/compare/main...${suggestedForkOwner}:contrib/previews-repo-${safeRepoBranch}?expand=1`;
            const contributorPreviewInstructions =
              "\n\nTo help with preview generation using your own GitHub API quota and runner minutes:\n" +
              `1. Fork this repository: https://github.com/${galleryOwner}/${galleryRepo}/fork\n` +
              `2. Open this workflow in your fork and click \"Run workflow\": ${forkWorkflowUrl}\n` +
              `3. Enter \`repo=${repoKey}\` (optional: set \`robot_targets\` for specific robots)\n` +
              `4. Open this PR URL after it pushes commits: ${compareUrl}\n` +
              "5. The workflow processes missing previews in commit batches of 5 and pushes each batch automatically.\n" +
              "6. If the run stops early, run it again with the same repo input to continue.\n" +
              "7. If the workflow reports an existing open PR for this repo branch, wait for that PR to finish.";

            await github.rest.issues.createComment({
              owner: galleryOwner,
              repo: galleryRepo,
              issue_number: issue.number,
              body: `${successComment}${contributorPreviewInstructions}`,
            });
            await github.rest.issues.update({
              owner: galleryOwner,
              repo: galleryRepo,
              issue_number: issue.number,
              state: "closed",
            });

            core.setOutput("dispatch_payload", JSON.stringify(dispatchPayload));

      - name: Trigger URDF Studio sync
        if: ${{ steps.ingest.outputs.dispatch_payload != '' }}
        uses: actions/github-script@v7
        env:
          DISPATCH_PAYLOAD: ${{ steps.ingest.outputs.dispatch_payload }}
          DISPATCH_TOKEN: ${{ secrets.URDF_STUDIO_DISPATCH_TOKEN }}
        with:
          github-token: ${{ secrets.URDF_STUDIO_DISPATCH_TOKEN }}
          script: |
            if (!process.env.DISPATCH_TOKEN) {
              core.info("URDF_STUDIO_DISPATCH_TOKEN is not set. Skipping dispatch.");
              return;
            }
            const payload = JSON.parse(process.env.DISPATCH_PAYLOAD || "{}");
            try {
              await github.rest.repos.createDispatchEvent({
                owner: "amtellezfernandez",
                repo: "urdf-star-studio",
                event_type: "robot-repos-updated",
                client_payload: payload,
              });
            } catch (error) {
              core.warning(
                `URDF Studio dispatch failed: ${error.status || "unknown"} ${error.message || error}`
              );
              if (payload.issueNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: payload.issueNumber,
                  body:
                    "Auto-ingest: saved to robots.json, but sync dispatch failed. " +
                    "Please verify URDF_STUDIO_DISPATCH_TOKEN has access to amtellezfernandez/urdf-star-studio.",
                });
              }
            }
